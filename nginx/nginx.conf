user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # JSON access log format — required fields: source_ip, timestamp, method, path, status, response_size
    # source_ip uses $remote_addr because nginx is the outermost proxy (no upstream setting X-Forwarded-For)
    log_format json_combined escape=json
        '{'
            '"source_ip":"$remote_addr",'
            '"timestamp":"$time_iso8601",'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"status":$status,'
            '"response_size":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"user_agent":"$http_user_agent",'
            '"host":"$host"'
        '}';

    # Write JSON logs to the shared HNG-nginx-logs volume
    access_log /var/log/nginx/hng-access.log json_combined;

    sendfile        on;
    keepalive_timeout 65;

    # Trust Docker internal network for X-Forwarded-For
    set_real_ip_from  10.0.0.0/8;
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  192.168.0.0/16;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    upstream nextcloud {
        server nextcloud:80;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 512M;
        proxy_read_timeout   300s;
        proxy_send_timeout   300s;

        # Forward real client IP to Nextcloud
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host              $host;

        location / {
            proxy_pass http://nextcloud;
        }
    }
}
