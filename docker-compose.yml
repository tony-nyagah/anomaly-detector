version: "3.9"

volumes:
  HNG-nginx-logs:
    name: HNG-nginx-logs
  nextcloud-data:
  nextcloud-db:

networks:
  hng-net:
    driver: bridge

services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    networks:
      - hng-net
    volumes:
      - nextcloud-db:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nextcloud}
      MYSQL_USER: ${MYSQL_USER:-nextcloud}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-nextcloudpassword}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  nextcloud:
    image: kefaslungu/hng-nextcloud
    restart: unless-stopped
    networks:
      - hng-net
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - nextcloud-data:/var/www/html
      - HNG-nginx-logs:/var/log/nginx:ro
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nextcloud}
      MYSQL_USER: ${MYSQL_USER:-nextcloud}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-nextcloudpassword}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD:-adminpassword}
      NEXTCLOUD_TRUSTED_DOMAINS: ${SERVER_IP:-localhost}

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    networks:
      - hng-net
    ports:
      - "80:80"
    depends_on:
      - nextcloud
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  detector:
    build:
      context: ./detector
      dockerfile: Dockerfile
    restart: unless-stopped
    # network_mode: host is required so that iptables rules added inside the
    # container apply to the host's INPUT chain. When using host networking,
    # the "networks" and "ports" keys are ignored by Docker — the dashboard
    # is still accessible on the host at port 8080.
    network_mode: host
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
      - /var/log/anomaly-detector:/var/log/anomaly-detector
      - ./detector/config.yaml:/app/config.yaml:ro
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      CONFIG_PATH: /app/config.yaml
    cap_add:
      - NET_ADMIN       # required for iptables
    depends_on:
      - nginx
